<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        svg {
            border: 1px solid #ccc;
            background-color: white;
        }
    </style>
</head>
<body>
    <svg width="400" height="400" viewBox="0 0 400 400">
        <!-- Horizontal lines -->
        <line x1="20" y1="20" x2="30" y2="30" stroke="black" stroke-width="2"/>
        <line x1="0" y1="50" x2="50" y2="50" stroke="black" stroke-width="2"/>
        <line x1="100" y1="50" x2="250" y2="50" stroke="black" stroke-width="2"/>
        <line x1="300" y1="50" x2="350" y2="50" stroke="black" stroke-width="2"/>
        <line x1="50" y1="150" x2="150" y2="150" stroke="black" stroke-width="2"/>
        <line x1="0" y1="200" x2="300" y2="200" stroke="black" stroke-width="2"/>
        <line x1="0" y1="250" x2="350" y2="250" stroke="black" stroke-width="2"/>
        <line x1="0" y1="300" x2="400" y2="300" stroke="black" stroke-width="2"/>

        <!-- Vertical lines -->
        <line x1="20" y1="30" x2="30" y2="20" stroke="black" stroke-width="2"/>
        <line x1="50" y1="50" x2="50" y2="150" stroke="black" stroke-width="2"/>
        <line x1="100" y1="0" x2="100" y2="100" stroke="black" stroke-width="2"/>
        <line x1="150" y1="100" x2="150" y2="150" stroke="black" stroke-width="2"/>
        <line x1="150" y1="240" x2="150" y2="400" stroke="black" stroke-width="2"/>
        <line x1="200" y1="100" x2="200" y2="320" stroke="black" stroke-width="2"/>
        <line x1="250" y1="50" x2="250" y2="150" stroke="black" stroke-width="2"/>
        <line x1="300" y1="0" x2="300" y2="100" stroke="black" stroke-width="2"/>
        <line x1="300" y1="150" x2="300" y2="200" stroke="black" stroke-width="2"/>
        <line x1="300" y1="320" x2="300" y2="400" stroke="black" stroke-width="2"/>
        <line x1="350" y1="50" x2="350" y2="250" stroke="black" stroke-width="2"/>
    </svg>
</body>
<button onclick="window.location.href='index.html'">Home</button>
</html>
