<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draw Lines on Grid</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        canvas {
            border: 1px solid #ccc;
            background-color: white;
            cursor: crosshair;
        }
        .button-column {
            position: absolute;
            top: 350px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .button-column button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <canvas id="gridCanvas" width="500" height="500"></canvas>

    <script>
        const canvas = document.getElementById('gridCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20; // Size of each grid cell
        
        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;
        let currentBrushColor = 'black'; // Default brush color
       function changeBrushColor(newColor) {
      currentBrushColor = newColor;
  }

        // Draw the grid
        function drawGrid() {
             // 1. Fill the entire canvas with white
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#ddd';
            ctx.lineWidth = 1;

            // Vertical lines
            for (let x = 0; x <= canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }

            // Horizontal lines
            for (let y = 0; y <= canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
        }

        // Start drawing
        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            [lastX, lastY] = [e.offsetX, e.offsetY];
        });

        // Draw line
        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
           ctx.strokeStyle = currentBrushColor;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(e.offsetX, e.offsetY);
            ctx.stroke();
            [lastX, lastY] = [e.offsetX, e.offsetY];
        });

        // Stop drawing
        canvas.addEventListener('mouseup', () => {
            isDrawing = false;
        });

        canvas.addEventListener('mouseout', () => {
            isDrawing = false;
        });

        // Initialize grid
        drawGrid();
        // Download canvas as image
        function downloadCanvas() {
            const canvas = document.getElementById("gridCanvas");
    
    // 1. Convert canvas to a data URL (PNG format)
    const imageURL = canvas.toDataURL("image/png");
    
    // 2. Create a temporary anchor element
    const link = document.createElement("a");
    link.href = imageURL;
    link.download = "my-drawing.png"; // Name of the downloaded file
    
    // 3. Trigger the download
    link.click();
  }
        
    </script>
</body>
<div class="button-column">
 <button onclick="window.location.href='index.html'">Home</button>
 <button onclick="changeBrushColor('black')">Black</button>
  <button onclick="changeBrushColor('red')">Red</button>
  <button onclick="changeBrushColor('blue')">Blue</button>
  <button onclick="changeBrushColor('green')">Green</button>
  <button onclick="downloadCanvas()">Download Drawing</button>
</div>
</html>
