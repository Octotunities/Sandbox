<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Invaders</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: sans-serif;
            color: #0f0;
        }
        h1 {
            margin-bottom: 20px;
        }
              .game-container {
            display: flex;
            flex-wrap: wrap; /* Automatically drops the sidebar underneath on small screens */
            gap: 30px;
            justify-content: center;
        }

        canvas {
            border: 3px solid rgb(176, 251, 176);
            background: #001a00;
        }
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 200px;
        }
        .hud-section {
            border: 2px solid rgb(176, 238, 176);
            padding: 15px;
            background: rgba(0, 30, 0, 0.8);
        }
        .stat {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 16px;
            font-weight: bold;
        }
        .game-over-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
        }
        .game-over-content {
            text-align: center;
            border: 3px solid rgb(92, 255, 92);
            padding: 40px;
            background: #001a00;
        }
        button {
            padding: 12px 30px;
            font-size: 18px;
            background: #0f0;
            color: #000;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>SPACE INVADERS</h1>
    <div class="game-container">
        <div>
            <canvas id="gameCanvas" width="800" height="600"></canvas>
            <p style="text-align: center; margin-top: 10px;">Arrows = Move | SPACE = Fire | CTRL = Pause</p>
        </div>
        <div class="sidebar">
            <div class="hud-section">
                <div class="stat"><span>Score:</span><span id="scoreDisplay">0</span></div>
                <div class="stat"><span>Lives:</span><span id="livesDisplay">3</span></div>
                <div class="stat"><span>Wave:</span><span id="waveDisplay">1</span></div>
            </div>
        <!-- ADD THIS ENTIRE HIGH SCORES BOX HERE -->
            <div class="hud-section" style="margin-top: 15px;">
                <p style="font-weight: bold; margin-bottom: 10px; text-align: center; color: #0f0;">🏆 TOP SCORES</p>
                <div id="highScoresList" style="font-size: 14px; line-height: 1.6;">
                    <!-- JavaScript will automatically inject the scores here -->
                </div>
            </div>
        </div> 
    <div class="game-over-overlay" id="gameOverOverlay">
        <div class="game-over-content">
            <h2>GAME OVER</h2>
            <p id="finalScore" style="margin: 20px 0; font-size: 24px; color: #ff0;">Final Score: 0</p>
            <button onclick="restartGame()">Play Again</button>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const PLAYER_SIZE = 50;
        const ENEMY_SIZE = 50;
        const BULLET_W = 4;
        const BULLET_H = 12;
        const P_SPEED = 10; 
        const PB_SPEED = 8;
        const EB_SPEED = 2;

        const gameState = {
            player: { x: 385, y: 550, width: PLAYER_SIZE, height: PLAYER_SIZE, image: null }, // Added image: null here
            enemies: [],
            playerBullets: [],
            enemyBullets: [],
            score: 0,
            lives: 3,
            gameRunning: true,
            wave: 1,
            enemyDirection: 1,
            enemySpeed: 1,
            lastShotTime: 0,
            shootCooldown: 400,
            isPaused: false, // ADDED: Tracks if the game is currently paused
            enemyImages: []// CHANGED: Changed to a list array to hold multiple alien files
        };

           
        
        const keys = { ArrowLeft: false, ArrowRight: false, ' ': false };

        window.addEventListener('keydown', (e) => {
            if (e.key in keys) {
                keys[e.key] = true;
                e.preventDefault();
            }
            // ADDED: Pressing P or p toggles the pause flag instantly
            if (e.key === 'Control' || e.key === 'Control') {
                if (gameState.gameRunning) {
                    gameState.isPaused = !gameState.isPaused;
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.key in keys) {
                keys[e.key] = false;
            }
        });
        function loadImages() {
            const pImg = new Image();
            pImg.src = 'images/player-ship.png';
            pImg.onload = () => { gameState.player.image = pImg; };

            // 2. REPLACE the old enemy lines with this smart multi-wave folder loader loop:
            for (let i = 1; i <= 3; i++) {
                const eImg = new Image();
                eImg.src = 'images/enemy-' + i + '.png';
                
                eImg.onload = () => { 
                    gameState.enemyImages[i] = eImg; 
                };
            }
        }
// PASTE YOUR TWO NEW HIGH SCORE FUNCTIONS RIGHT HERE:
        function updateHighScoreDisplay() {
            const scores = JSON.parse(localStorage.getItem('space_invaders_scores')) || [0, 0, 0];
            const listContainer = document.getElementById('highScoresList');
            listContainer.innerHTML = '';
            scores.forEach((score, index) => {
                listContainer.innerHTML += `
                    <div style="display: flex; justify-content: space-between; margin-bottom: 4px;">
                        <span>${index + 1}.</span>
                        <span style="color: #ff0; font-weight: bold;">${score}</span>
                    </div>`;
            });
        }

        function saveHighScore(finalScore) {
            let scores = JSON.parse(localStorage.getItem('space_invaders_scores')) || [0, 0, 0];
            scores.push(finalScore);
            scores.sort((a, b) => b - a);
            scores = scores.slice(0, 3);
            localStorage.setItem('space_invaders_scores', JSON.stringify(scores));
            updateHighScoreDisplay();
        }
        function initEnemies() {
            const rows = 4;
            const cols = 8;
            gameState.enemies = [];
            gameState.enemySpeed = 1 + (gameState.wave - 1) * 0.25;
            gameState.enemyDirection = 1;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    gameState.enemies.push({
                        x: 80 + c * 60,
                        y: 60 + r * 45,
                        width: ENEMY_SIZE,
                        height: ENEMY_SIZE,
                        points: (rows - r) * 10
                    });
                }
            }
        }

        function checkCollision(r1, r2) {
            return r1.x < r2.x + r2.width &&
                   r1.x + r1.width > r2.x &&
                   r1.y < r2.y + r2.height &&
                   r1.y + r1.height > r2.y;
        }
        function update() {
            if (!gameState.gameRunning) return;
            if (gameState.isPaused) return; // ADDED: Freezes all movements and timers when paused


            if (keys.ArrowLeft) gameState.player.x -= P_SPEED;
            if (keys.ArrowRight) gameState.player.x += P_SPEED;
            gameState.player.x = Math.max(0, Math.min(800 - PLAYER_SIZE, gameState.player.x));

            if (keys[' ']) {
                const now = Date.now();
                if (now - gameState.lastShotTime > gameState.shootCooldown) {
                    gameState.playerBullets.push({
                        x: gameState.player.x + 13,
                        y: gameState.player.y,
                        width: BULLET_W,
                        height: BULLET_H
                    });
                    gameState.lastShotTime = now;
                }
            }

            for (let i = gameState.playerBullets.length - 1; i >= 0; i--) {
                gameState.playerBullets[i].y -= PB_SPEED;
                if (gameState.playerBullets[i].y < 0) {
                    gameState.playerBullets.splice(i, 1);
                }
            }

            let hitWall = false;
            gameState.enemies.forEach(e => {
                e.x += gameState.enemySpeed * gameState.enemyDirection;
                if (e.x <= 0 || e.x + ENEMY_SIZE >= 800) hitWall = true;
            });

            if (hitWall) {
                gameState.enemyDirection *= -1;
                gameState.enemies.forEach(e => {
                    e.y += 25;
                    if (e.y + ENEMY_SIZE >= gameState.player.y) endGame();
                });
            }

            if (gameState.enemies.length > 0 && Math.random() < 0.005 + (gameState.wave * 0.005)) {
                const rand = gameState.enemies[Math.floor(Math.random() * gameState.enemies.length)];
                gameState.enemyBullets.push({
                    x: rand.x + 10,
                    y: rand.y + ENEMY_SIZE,
                    width: BULLET_W,
                    height: BULLET_H
                });
            }

            for (let i = gameState.enemyBullets.length - 1; i >= 0; i--) {
                gameState.enemyBullets[i].y += EB_SPEED;
                if (gameState.enemyBullets[i].y > 600) {
                    gameState.enemyBullets.splice(i, 1);
                    continue;
                }
                if (checkCollision(gameState.enemyBullets[i], gameState.player)) {
                    gameState.enemyBullets.splice(i, 1);
                    gameState.lives--;
                    document.getElementById('livesDisplay').innerText = gameState.lives;
                    if (gameState.lives <= 0) endGame();
                }
            }

            for (let i = gameState.playerBullets.length - 1; i >= 0; i--) {
                let hit = false;
                for (let j = gameState.enemies.length - 1; j >= 0; j--) {
                    if (checkCollision(gameState.playerBullets[i], gameState.enemies[j])) {
                        gameState.score += gameState.enemies[j].points;
                        document.getElementById('scoreDisplay').innerText = gameState.score;
                        gameState.enemies.splice(j, 1);
                        hit = true;
                        break;
                    }
                }
                if (hit) gameState.playerBullets.splice(i, 1);
            }

            if (gameState.enemies.length === 0) {
                gameState.wave++;
                document.getElementById('waveDisplay').innerText = gameState.wave;
                gameState.playerBullets = [];
                gameState.enemyBullets = [];
                initEnemies();
            }
        }
               function draw() {
            ctx.clearRect(0, 0, 800, 600);

            // Draw Player Ship PNG or Fallback Triangle
            if (gameState.player.image) {
                ctx.drawImage(gameState.player.image, gameState.player.x, gameState.player.y, gameState.player.width, gameState.player.height);
            } else {
                ctx.fillStyle = '#0f0';
                ctx.beginPath();
                ctx.moveTo(gameState.player.x + 15, gameState.player.y);
                ctx.lineTo(gameState.player.x, gameState.player.y + 30);
                ctx.lineTo(gameState.player.x + 30, gameState.player.y + 30);
                ctx.closePath();
                ctx.fill();
            }

              // Draw Alien Invaders (Checks your active wave number for the correct graphic)
            gameState.enemies.forEach(e => {
                // Look up the specific image slot that matches the current wave number
                const currentAlienSprite = gameState.enemyImages[gameState.wave];

                if (currentAlienSprite) {
                    ctx.drawImage(currentAlienSprite, e.x, e.y, e.width, e.height);
                } else {
                    // Automatic Fallback: Use the original classic block if file load fails
                    ctx.fillStyle = '#f0f';
                    ctx.fillRect(e.x, e.y, e.width, e.height);
                    ctx.fillStyle = '#000';
                    ctx.fillRect(e.x + 4, e.y + 6, 4, 4);
                    ctx.fillRect(e.x + 17, e.y + 6, 4, 4);
                }
            });

                 // Draw Player Bullets as Round Circles
            ctx.fillStyle = '#ffffff';
            gameState.playerBullets.forEach(b => {
                ctx.beginPath();
                // Draws a circle at the bullet center with a 3-pixel radius
                ctx.arc(b.x + b.width / 2, b.y + b.height / 2, 3, 0, Math.PI * 2);
                ctx.fill();
            });

             // Draw Enemy Bullets as Round Circles
            ctx.fillStyle = '#ffffff';
            gameState.enemyBullets.forEach(b => {
                ctx.beginPath();
                ctx.arc(b.x + b.width / 2, b.y + b.height / 2, 3, 0, Math.PI * 2);
                ctx.fill();

           
            });
                 // ADDED: Renders a large neon "PAUSED" message directly over the gameplay canvas area
            if (gameState.isPaused) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)'; // Translucent dark overlay shade
                ctx.fillRect(0, 0, 800, 600);
                
                ctx.fillStyle = '#00ff00';
                ctx.font = 'bold 40px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('GAME PAUSED', 400, 300);
                
                ctx.font = '20px sans-serif';
                ctx.fillText('Press "Ctrl" to Resume', 400, 350);
        }
    }
    

        function gameLoop() {
            try {
                update();
                draw();
            } catch (err) {
                console.error(err);
            }
            requestAnimationFrame(gameLoop);
        }

        function endGame() {
            gameState.gameRunning = false;
                   // ADD THIS LINE HERE: Fires your score into the permanent memory array
            saveHighScore(gameState.score);
            
            document.getElementById('finalScore').innerText = "Final Score: " + gameState.score;
            document.getElementById('gameOverOverlay').style.display = 'flex';
        } 

        function restartGame() {
            gameState.score = 0;
            gameState.lives = 3;
            gameState.wave = 1;
            gameState.playerBullets = [];
            gameState.enemyBullets = [];
            gameState.player.x = 385;
            document.getElementById('scoreDisplay').innerText = '0';
            document.getElementById('livesDisplay').innerText = '3';
            document.getElementById('waveDisplay').innerText = '1';
            document.getElementById('gameOverOverlay').style.display = 'none';
            initEnemies();
            gameState.gameRunning = true;
        }
      // Make sure this activation line is here so the zeros load instantly!
        updateHighScoreDisplay(); 
    // Call the loader here so the game searches your folder immediately
        loadImages(); 
        initEnemies();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
