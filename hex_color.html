<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hex Color Grid</title>
    <style>
        /* This creates the grid container */
        .color-grid {
            display: grid;
            grid-template-columns: repeat(20, 20px); /* 10 columns of 20px each */
            gap: 2px; /* Adds space between the boxes */
            margin-top: 20px;
        }

        /* This applies to all the color boxes */
        .box {
            width: 20px;  /* smaller boxes to be able to make a pixel image easier*/
            height: 20px;
            border-radius: 2px; /* Optional: adds nice rounded corners */
        }
    </style>
</head>
<body>
    <h1>Hex Color Grid</h1>
    <p>Hover over or click a box to see the colors in a larger grid format.</p>

    <div class="color-grid">
        <!--row 1-->
        <div class="box" style="background-color: #FF5733;"></div>
        <div class="box" style="background-color: #33FF57;"></div>
        <div class="box" style="background-color: #3357FF;"></div>
        <div class="box" style="background-color: #F39C12;"></div>
        <div class="box" style="background-color: #8E44AD;"></div>
        <div class="box" style="background-color: #2ECC71;"></div>
        <div class="box" style="background-color: #E74C3C;"></div>
        <div class="box" style="background-color: #3498DB;"></div>
        <div class="box" style="background-color: #9B59B6;"></div>
        <div class="box" style="background-color: #1ABC9C;"></div>
        
  

        <!--row 2-->
        <div class="box" style="background-color: #F1C40F;"></div>

    </div>
</body>
</html>
