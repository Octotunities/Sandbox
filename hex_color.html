<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hex Color Grid</title>
    <style>
        /* This creates the grid container */
        .color-grid {
            display: grid;
            grid-template-columns: repeat(20, 20px); /* 10 columns of 20px each */
            gap: 2px; /* Adds space between the boxes */
            margin-top: 20px;
        }

        /* This applies to all the color boxes */
        .box {
            width: 20px;  /* smaller boxes to be able to make a pixel image easier*/
            height: 20px;
            border-radius: 2px; /* Optional: adds nice rounded corners */
        }
    </style>
</head>
